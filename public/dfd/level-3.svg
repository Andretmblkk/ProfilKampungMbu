<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" role="img" aria-label="DFD Level 3"><style>.dfd-title{font:700 22px Arial,sans-serif;text-anchor:middle;fill:#172033}.dfd-node rect,.dfd-node ellipse,.dfd-store path{fill:#fff;stroke:#172033;stroke-width:2}.dfd-process ellipse{fill:#f9fcff}.dfd-entity rect{fill:#fff}.dfd-store path{fill:none}.dfd-node text{font:600 13px Arial,sans-serif;text-anchor:middle;dominant-baseline:middle;fill:#172033}.dfd-store text{font-weight:600}.dfd-flow path{fill:none;stroke:#2f3b4f;stroke-width:1.6;shape-rendering:geometricPrecision}.dfd-flow text{font:12px Arial,sans-serif;text-anchor:middle;fill:#2f3b4f;paint-order:stroke;stroke:#fff;stroke-width:5px;stroke-linejoin:round}marker path{fill:#2f3b4f}@media(prefers-color-scheme:dark){.dfd-title,.dfd-node text{fill:#eef3ff}.dfd-node rect,.dfd-node ellipse{fill:#152033;stroke:#d8e1f3}.dfd-process ellipse{fill:#172a42}.dfd-store path{stroke:#d8e1f3}.dfd-flow path{stroke:#c7d2e6}.dfd-flow text{fill:#eef3ff;stroke:#111827}marker path{fill:#c7d2e6}}</style><text class="dfd-title" x="590" y="280">DFD Level 3</text></svg>